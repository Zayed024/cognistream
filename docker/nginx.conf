server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ───────────────────────────────
    # Frontend calls /api/* which nginx forwards to the
    # backend container, stripping the /api prefix.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large uploads (video files)
        client_max_body_size 2048m;

        # Long timeouts for processing endpoints
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 30s;
    }

    # ── Video streaming ─────────────────────────────────
    # Support range requests for seeking within video files.
    location /api/video/ {
        proxy_pass         http://backend:8000/video/;
        proxy_http_version 1.1;
        proxy_set_header   Host  $host;
        proxy_set_header   Range $http_range;
        proxy_buffering    off;
    }

    # ── SPA fallback ────────────────────────────────────
    # All non-API, non-file routes serve index.html so
    # client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caching for static assets ───────────────────────
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

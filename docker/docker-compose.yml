# ─────────────────────────────────────────────────────────
# CogniStream — Docker Compose
#
# Edge deployment simulation: 4 services, 4 CPU / 6 GB RAM
# total budget.  All models are baked into images at build
# time — no internet required at runtime.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# Access:
#   Frontend:  http://localhost:3000
#   Backend:   http://localhost:8000
#   Ollama:    http://localhost:11434
#   ChromaDB:  http://localhost:8500
# ─────────────────────────────────────────────────────────

services:

  # ── Ollama (Vision Language Model server) ─────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cognistream-ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      - OLLAMA_MODEL=moondream2
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - cognistream

  # ── ChromaDB (vector database) ────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: cognistream-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8500:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "chroma", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cognistream

  # ── Backend (FastAPI + processing pipeline) ───────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cognistream-backend
    volumes:
      - app_data:/app/data
    environment:
      - COGNISTREAM_ROOT=/app
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=moondream2
      - VLM_WORKERS=1
      - OLLAMA_TIMEOUT=120
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - WHISPER_MODEL_SIZE=base
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - MAX_VIDEO_SIZE_MB=2048
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          memory: 512M
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognistream

  # ── Frontend (React + nginx) ──────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: cognistream-frontend
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cognistream

# ── Volumes ─────────────────────────────────────────────
# Named volumes persist data across container restarts.
volumes:
  ollama_data:
    driver: local
  chroma_data:
    driver: local
  app_data:
    driver: local

# ── Network ─────────────────────────────────────────────
# Internal bridge network — containers talk to each other,
# no external access needed at runtime.
networks:
  cognistream:
    driver: bridge
    internal: false  # false so host can reach published ports

# ─────────────────────────────────────────────────────────
# CogniStream — Docker Compose (Local Ollama)
#
# Uses the host machine's Ollama app instead of a container.
# Only runs ChromaDB, Backend, and Frontend in Docker.
#
# Usage:
#   docker compose -f docker/docker-compose.local.yml up -d
#
# Prerequisites:
#   - Ollama desktop app running on host (port 11434)
#   - Model pulled:  ollama pull moondream
#
# Access:
#   Frontend:  http://localhost:3000
#   Backend:   http://localhost:8000
#   ChromaDB:  http://localhost:8500
# ─────────────────────────────────────────────────────────

services:

  # ── ChromaDB (vector database) ────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: cognistream-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8500:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "chroma", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cognistream

  # ── Backend (FastAPI + processing pipeline) ───────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cognistream-backend
    volumes:
      - app_data:/app/data
    environment:
      - COGNISTREAM_ROOT=/app
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=moondream
      - OLLAMA_TIMEOUT=120
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - WHISPER_MODEL_SIZE=base
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - MAX_VIDEO_SIZE_MB=2048
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          memory: 512M
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cognistream

  # ── Frontend (React + nginx) ──────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: cognistream-frontend
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cognistream

# ── Volumes ─────────────────────────────────────────────
volumes:
  chroma_data:
    driver: local
  app_data:
    driver: local

# ── Network ─────────────────────────────────────────────
networks:
  cognistream:
    driver: bridge
    internal: false
